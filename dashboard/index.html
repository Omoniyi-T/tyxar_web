<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Dashboard - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f7fafc;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="dashboard" class="hidden">
        <!-- Actual site header will be injected here on login -->
        <div id="header"></div>
        <div class="profile-events">
            <div id="content" class="content">
                <div class="content-wrapper">
                    <!-- Dashboard content will be loaded here by JS after login -->
                </div>
            </div>
        </div>
    </div>
    <div id="loginPrompt" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div style="background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px 32px 32px 32px; max-width: 350px; width: 100%;">
            <div style="display: flex; justify-content: center; margin-bottom: 24px;">
                <img src="/tyxar_web/images/tyxar.png" alt="Tyxar Logo" style="width: 64px; height: 64px;">
            </div>
            <h2 style="text-align: center; margin-bottom: 24px; color: #2d3748;">Login Required</h2>
            <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
            <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
            <button onclick="login()" style="width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; background: #607DF0; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s;">Log in</button>
            <button onclick="loginWithGitHub()" style="width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; background: #5e5f60; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s;">
                <img src="/tyxar_web/images/github-icon.png" alt="Github Icon" style="vertical-align: middle; width: 18px; height: 18px; margin-right: 6px;">Login with GitHub
            </button>
            <button onclick="loginWithGoogle()" style="width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px; background: #4f85dd; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s;">
                <img src="/tyxar_web/images/google-icon.png" alt="Google Icon" style="vertical-align: middle; width: 18px; height: 18px; margin-right: 6px;">Login with Google
            </button>
            <div class="auth-toggle" style="text-align: center; margin-top: 10px;">
                <a href="/tyxar_web/profile/" style="color: #607DF0; text-decoration: none; font-size: 0.95rem;">Don't have an account? Sign up</a>
            </div>
            <div class="status" id="authStatus" style="margin-top: 16px; text-align: center; color: #e53e3e; font-size: 0.95rem;"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/tyxar_web/profile/config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>
    <script>
        // Check login status and show dashboard or login prompt
        document.addEventListener('DOMContentLoaded', async () => {
            let user = null;
            try {
                user = (await supabaseClient.auth.getUser()).data.user;
            } catch (e) { user = null; }
            if (user) {
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('loginPrompt').style.display = 'none';
                // Optionally, load dashboard content here
            } else {
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('loginPrompt').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
