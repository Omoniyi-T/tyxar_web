<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Dashboard - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/tyxar_web/profile/config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>
    <script src="/tyxar_web/script.js"></script>
    <script>
        function loadHTML(url, elementId) {
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(elementId).innerHTML = data;

                        // --- CRITICAL STEP ---
                        // Re-run initialization to catch the *new* links in the footer 
                        // AND the sidebar links (since they use the global selector now)
                        initializeContentLoader();

                        // Initialize header search if header was loaded
                        if (elementId === 'header' && window.initializeHeaderSearch) {
                            setTimeout(() => window.initializeHeaderSearch(), 100);
                        }
                    })
                    .catch(err => console.error(`Error loading ${url}:`, err));
            }
        document.addEventListener('DOMContentLoaded', (event) => {
                // Load Header, Footer, and Sidebar
                loadHTML('/tyxar_web/header.html', 'header');
                loadHTML('/tyxar_web/footer.html', 'footer');});
    </script>
</head>

<body>
    <div id="header"></div>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/tyxar_web/images/tyxar.ico" alt="Admin avatar" class="sidebar-avatar">
                <span class="sidebar-admin">Admin name</span>
                <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&times;</button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link"><span class="sidebar-icon">🏠</span> Home</a>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">📦</span> Products</a>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">👤</span> Users</a>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">🛒</span> Orders</a>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">⚙️</span> Account</a>
            </nav>
        </aside>

        <!-- Hamburger for mobile -->
        <button class="sidebar-hamburger" id="sidebarHamburger" aria-label="Open sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Main dashboard content -->
        <main class="dashboard-main">
            <div class="dashboard-header">
                <h2>Welcome back, <span class="dashboard-user">Admin</span> <span class="dashboard-emoji">😎</span></h2>
                <div class="dashboard-time" id="dashboardTime"></div>
            </div>
            <div class="dashboard-cards">
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Products</div>
                    <div class="dashboard-card-icon">📦</div>
                    <div class="dashboard-card-value" id="productsCount">5</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Users</div>
                    <div class="dashboard-card-icon">👤</div>
                    <div class="dashboard-card-value" id="usersCount">5</div>
                </div>
                <div class="dashboard-card">
                    <div class="dashboard-card-title">Orders</div>
                    <div class="dashboard-card-icon">🛒</div>
                    <div class="dashboard-card-value" id="ordersCount">5</div>
                </div>
            </div>
        </main>
    </div>
    <div id="footer"></div>
</body>
</html>
