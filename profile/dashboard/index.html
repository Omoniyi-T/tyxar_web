<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Dashboard - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/tyxar_web/profile/config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>
    <style>
        /* Place dashboard-specific styles here or import from styles.css */
    </style>
</head>
<body>
    <div id="dashboard-root"></div>
    <script>
    // Require login before showing dashboard
    document.addEventListener('DOMContentLoaded', async () => {
        const { data } = await supabaseClient.auth.getUser();
        if (!data || !data.user) {
            window.location.href = '/tyxar_web/profile/';
            return;
        }
        // If logged in, render dashboard
        // You can move your dashboard HTML and logic here
        document.getElementById('dashboard-root').innerHTML = `
            <!-- Dashboard content goes here -->
            <h1>Welcome to your Dashboard, <span id="dashboardName"></span>!</h1>
            <!-- Add dashboard sections/components here -->
        `;
        // Optionally, load user info and render
        // Example: document.getElementById('dashboardName').textContent = data.user.email;
    });
    </script>
</body>
</html>
