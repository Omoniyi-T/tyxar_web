<!DOCTYPE html>
<html lang="en"
>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Login - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f7fafc;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 32px 32px 32px;
            max-width: 350px;
            width: 100%;
            margin: 40px auto;
        }
        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .logo img {
            width: 64px;
            height: 64px;
        }
        #auth h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #2d3748;
        }
        #auth input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        #auth button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            background: #607DF0;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #auth button:hover {
            background: #4257b2;
        }
        #auth .auth-toggle {
            text-align: center;
            margin-top: 10px;
        }
        #auth .auth-toggle a {
            color: #607DF0;
            text-decoration: none;
            font-size: 0.95rem;
        }
        #auth .auth-toggle a:hover {
            text-decoration: underline;
        }
        #auth .status {
            margin-top: 16px;
            text-align: center;
            color: #e53e3e;
            font-size: 0.95rem;
        }
        #signupForm {
            display: none;
        }
        @media (max-width: 480px) {
            .box {
                padding: 24px 8px 16px 8px;
            }
        }
    </style>
    

</head>

<body>


    <div class="box">
        <div id="auth">
            <div class="logo">
                <img src="/tyxar_web/images/tyxar.png" alt="Tyxar Logo">
            </div>
            <!-- LOGIN FORM -->
            <div id="loginForm">
                <h2>Tyxar Account</h2>
                <input id="email" type="email" placeholder="Email" />
                <input id="password" type="password" placeholder="Password" />
                <button onclick="login()">Log in</button>
                <button onclick="loginWithGitHub()" style="background: #5e5f60; margin-top: 0.5rem;">
                    <img src="/tyxar_web/images/github-icon.png" alt="Github Icon" style="vertical-align: middle; width: 18px; height: 18px; margin-right: 6px;">
                    Login with GitHub
                </button>
                <button onclick="loginWithGoogle()" style="background: #4f85dd; color: white; margin-top: 0.5rem;">
                    <img src="/tyxar_web/images/google-icon.png" alt="Google Icon" style="vertical-align: middle; width: 18px; height: 18px; margin-right: 6px;">
                    Login with Google
                </button>
                <div class="auth-toggle">
                    <a href="#" onclick="showSignup()">Don't have an account? Sign up</a>
                </div>
            </div>
            <!-- SIGNUP FORM -->
            <div id="signupForm">
                <h2>Create Account</h2>
                <input id="signupName" type="text" placeholder="Full Name" />
                <input id="signupEmail" type="email" placeholder="Email" />
                <input id="signupPassword" type="password" placeholder="Password" />
                <button onclick="signup()">Sign up</button>
                <div class="auth-toggle">
                    <a href="#" onclick="showLogin()">Already have an account? Log in</a>
                </div>
            </div>
            <div class="status" id="authStatus"></div>
        </div>
    </div>

    <!-- Supabase and Auth Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>
    <script>
        // Show/hide login/signup forms
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        // Default to login form
        showLogin();
    </script>

</body>

</html>
